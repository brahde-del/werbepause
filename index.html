<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadtrip Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1B1F3B;
    --ink-soft: #2E335A;
    --cream: #FBF3E6;
    --red: #E63946;
    --mustard: #F4A300;
    --green: #2A9D5C;
    --blue: #003399;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--ink);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 20px 40px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--mustard);
  }

  .round-counter {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: rgba(251,243,230,0.7);
  }

  .screen { display: flex; flex-direction: column; gap: 16px; flex: 1; }
  .hidden { display: none !important; }

  .title {
    font-family: 'Anton', sans-serif;
    font-size: 32px;
    line-height: 1.15;
    margin: 4px 0 0;
    color: var(--cream);
  }

  /* Game Selector */
  .game-selector {
    background: var(--mustard);
    padding: 4px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    margin-bottom: 8px;
  }
  .game-selector select {
    background: transparent;
    color: var(--ink);
    border: none;
    padding: 12px 14px;
    font-family: 'Anton', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    cursor: pointer;
    outline: none;
    -webkit-appearance: none;
  }

  .rules {
    background: var(--ink-soft);
    border-radius: 14px;
    padding: 16px 18px;
  }
  .rules h2 {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--mustard);
    margin: 0 0 10px;
  }
  .rules ol { margin: 0; padding-left: 20px; display: flex; flex-direction: column; gap: 6px; font-size: 14px; line-height: 1.4; }
  .hint { margin: 0; font-size: 13px; line-height: 1.5; color: rgba(251,243,230,0.75); }
  .rules .hint { margin-top: 12px; }

  .player-input { display: flex; gap: 8px; margin: 0; }
  .player-input input {
    flex: 1;
    background: var(--cream);
    color: var(--ink);
    border: none;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 16px;
    font-family: 'Inter', sans-serif;
  }
  .player-input input:focus { outline: 2px solid var(--mustard); }

  .player-list { list-style: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; gap: 8px; }
  .player-list li {
    display: flex; align-items: center; gap: 8px;
    background: var(--ink-soft); border-radius: 999px;
    padding: 6px 8px 6px 14px; font-size: 14px; font-weight: 600;
  }
  .player-list button { background: none; border: none; color: var(--red); font-size: 18px; cursor: pointer; line-height: 1; padding: 4px; }

  .settings-box {
    background: var(--ink-soft); padding: 14px 16px; border-radius: 12px;
    display: flex; justify-content: space-between; align-items: center; font-size: 14px; margin-top: 4px;
  }
  .settings-box label { font-weight: 600; color: rgba(251,243,230,0.9); }
  .settings-box select {
    background: var(--cream); color: var(--ink); border: none; border-radius: 8px;
    padding: 8px 12px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
  }

  .btn {
    border: none; border-radius: 12px; padding: 14px 18px;
    font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--mustard); color: var(--ink); }
  .btn-secondary { background: var(--cream); color: var(--ink); }
  .btn-correct { background: var(--green); color: var(--cream); }
  .btn-wrong { background: var(--red); color: var(--cream); }
  .btn-text { background: none; color: rgba(251,243,230,0.65); text-decoration: underline; font-weight: 500; font-size: 13px; padding: 8px; align-self: center; }

  .turn-indicator { text-align: center; font-family: 'Space Mono', monospace; font-size: 14px; color: var(--cream); margin: 0; }

  /* GAME 1: Werbepause Card */
  .tag-card-wrapper { position: relative; perspective: 1200px; min-height: 300px; margin-top: 4px; }
  .tag-hole { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 26px; height: 26px; border-radius: 50%; background: var(--ink); border: 4px solid var(--ink-soft); z-index: 3; }
  .tag-card { position: relative; width: 100%; height: 100%; min-height: 300px; transition: transform 0.6s cubic-bezier(.4,.2,.2,1); transform-style: preserve-3d; }
  .tag-card.flipped { transform: rotateY(180deg); }
  .tag-card.no-transition { transition: none !important; }
  .tag-face { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px 24px; border-radius: 18px; backface-visibility: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.35); }
  .tag-front { background: var(--cream); color: var(--ink); transform: rotateY(0deg); }
  .tag-back { background: var(--mustard); color: var(--ink); transform: rotateY(180deg); }
  .tag-label { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.6; margin-bottom: 6px; }
  .tag-blank { font-family: 'Anton', sans-serif; font-size: 30px; letter-spacing: 4px; color: var(--red); margin-bottom: 18px; }
  .tag-brand { font-family: 'Anton', sans-serif; font-size: 28px; letter-spacing: 1px; margin-bottom: 18px; }
  .tag-quote { font-size: clamp(15px, 4.4vw, 19px); line-height: 1.4; font-style: italic; margin: 0; }

  /* GAME 2: Kennzeichen */
  .license-plate-form { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
  .license-plate {
    display: flex; background: #fff; border: 3px solid #000; border-radius: 8px;
    overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  .plate-euro { background: var(--blue); color: #fff; padding: 12px 6px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: bold; width: 40px; }
  .plate-euro-stars { font-size: 16px; line-height: 1; }
  .plate-input {
    flex: 1; border: none; font-family: 'Space Mono', monospace; font-size: 36px;
    text-transform: uppercase; text-align: center; outline: none; color: #000;
    padding: 10px; background: transparent;
  }
  .plate-result-box { background: var(--ink-soft); border-radius: 12px; padding: 24px; text-align: center; display: flex; flex-direction: column; gap: 12px; }
  .plate-result-city { font-family: 'Anton', sans-serif; font-size: 28px; color: var(--mustard); line-height: 1.1; margin: 0; }
  .plate-result-district { font-size: 15px; color: var(--cream); opacity: 0.8; margin: 0; }
  .award-points { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .award-points-title { font-family: 'Space Mono', monospace; font-size: 12px; text-transform: uppercase; color: var(--mustard); margin-bottom: 4px; }
  .award-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  
  /* GAME 3: Zitate */
  .quote-card { background: var(--cream); color: var(--ink); padding: 30px 24px; border-radius: 16px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.35); }
  .quote-text { font-size: 18px; line-height: 1.4; font-style: italic; margin: 0 0 20px; font-weight: 600; }
  .mc-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .mc-btn {
    background: var(--ink-soft); color: var(--cream); border: 2px solid transparent;
    border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 600;
    cursor: pointer; text-align: left; transition: all 0.2s; font-family: 'Inter', sans-serif;
  }
  .mc-btn:disabled { cursor: default; opacity: 0.8; }
  .mc-btn.correct { background: var(--green); color: #fff; border-color: var(--green); }
  .mc-btn.wrong { background: var(--red); color: #fff; border-color: var(--red); }

  /* Scoreboard shared */
  .scoreboard { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .team-total { text-align: center; }
  .team-total .big-number { font-family: 'Anton', sans-serif; font-size: 44px; color: var(--mustard); line-height: 1; }
  .team-total .label { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: rgba(251,243,230,0.6); margin-top: 4px; }
  .player-rows { display: flex; flex-direction: column; gap: 8px; }
  .player-row { display: flex; justify-content: space-between; align-items: center; background: var(--ink-soft); border-radius: 10px; padding: 10px 14px; font-size: 14px; }
  .player-row.active { box-shadow: inset 0 0 0 2px var(--mustard); }
  .player-name { font-weight: 700; }
  
  .tally { display: flex; align-items: center; }
  .tally-group { position: relative; display: inline-flex; gap: 2px; margin-right: 6px; }
  .bar { width: 3px; height: 14px; background: var(--cream); display: inline-block; border-radius: 1px; }
  .tally-group .strike { position: absolute; width: 20px; height: 2px; background: var(--red); top: 6px; left: -2px; transform: rotate(-50deg); }
  .tally-num { font-family: 'Space Mono', monospace; font-weight: 700; margin-left: 4px; }

  .end-summary { font-size: 15px; line-height: 1.5; text-align: center; }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <span class="eyebrow" id="topbarTitle">📺 Werbepause</span>
    <span class="round-counter" id="roundCounter"></span>
  </header>

  <section id="setup" class="screen">
    
    <div class="game-selector">
      <select id="gameSelect">
        <option value="slogans">📺 Spiel: Werbepause</option>
        <option value="plates">🚗 Spiel: Kennzeichen-Jäger</option>
        <option value="quotes">⚽ Spiel: Fußball-Mythen</option>
      </select>
    </div>

    <div class="rules" id="rulesBox">
      </div>

    <form id="playerForm" class="player-input">
      <input id="playerNameInput" placeholder="Name eingeben…" maxlength="16">
      <button type="submit" class="btn btn-secondary">+ Hinzufügen</button>
    </form>
    
    <ul id="playerList" class="player-list"></ul>

    <div class="settings-box">
      <label id="settingLabel">Einstellung:</label>
      <select id="settingSelect">
        </select>
    </div>

    <button id="startBtn" class="btn btn-primary">Spiel starten</button>
  </section>

  <section id="game-slogans" class="screen hidden">
    <p class="turn-indicator" id="turnIndicatorSlogans"></p>
    <div class="tag-card-wrapper">
      <div class="tag-hole"></div>
      <div class="tag-card" id="tagCard">
        <div class="tag-face tag-front">
          <span class="tag-label">Marke:</span>
          <span class="tag-blank">______</span>
          <p class="tag-quote" id="frontQuote"></p>
        </div>
        <div class="tag-face tag-back">
          <span class="tag-label">Marke:</span>
          <span class="tag-brand" id="backBrand"></span>
          <p class="tag-quote" id="backQuote"></p>
        </div>
      </div>
    </div>
    <div id="revealActions" style="display:flex; justify-content:center;">
      <button id="revealBtn" class="btn btn-secondary" style="min-width: 220px;">🔍 Marke zeigen</button>
    </div>
    <div id="judgeActions" class="hidden" style="display:flex; gap:12px;">
      <button id="wrongBtn" class="btn btn-wrong" style="flex:1;">❌ Falsch</button>
      <button id="correctBtn" class="btn btn-correct" style="flex:1;">✅ Richtig</button>
    </div>
    <div class="scoreboard" id="scoreboardSlogans"></div>
    <button class="btn-text restart-btn">🔄 Zurück zum Menü</button>
  </section>

  <section id="game-plates" class="screen hidden">
    <p class="turn-indicator">Kennzeichen entdeckt? Schnell eintippen!</p>
    
    <form id="plateForm" class="license-plate-form">
      <div class="license-plate">
        <div class="plate-euro">
          <span class="plate-euro-stars">🇪🇺</span>
          <span>D</span>
        </div>
        <input type="text" id="plateInput" class="plate-input" placeholder="B, HH, BRA..." autocomplete="off" autocorrect="off" autocapitalize="characters">
      </div>
      <button type="submit" class="btn btn-primary">🔍 Kennzeichen suchen</button>
    </form>

    <div id="plateResultArea" class="plate-result-box hidden">
      <h2 class="plate-result-city" id="plateCity">Stadt</h2>
      <p class="plate-result-district" id="plateDistrict">Landkreis</p>
      
      <div class="award-points" id="awardPointsBox">
        <span class="award-points-title">Wer war zuerst? Punkt geben an:</span>
        <div class="award-grid" id="awardGrid">
          </div>
        <button id="nobodyBtn" class="btn btn-secondary" style="margin-top:4px;">Niemand (Auslassen)</button>
      </div>
    </div>

    <div class="scoreboard" id="scoreboardPlates"></div>
    <button class="btn-text restart-btn">🔄 Zurück zum Menü</button>
  </section>

  <section id="game-quotes" class="screen hidden">
    <p class="turn-indicator" id="turnIndicatorQuotes"></p>
    
    <div class="quote-card">
      <p class="quote-text" id="quoteText">"..."</p>
      <div class="mc-grid" id="mcGrid">
        </div>
    </div>

    <button id="nextQuoteBtn" class="btn btn-primary hidden">Nächste Frage ➡️</button>

    <div class="scoreboard" id="scoreboardQuotes"></div>
    <button class="btn-text restart-btn">🔄 Zurück zum Menü</button>
  </section>

  <section id="end" class="screen hidden">
    <h1 class="title" style="text-align: center;">Ergebnis</h1>
    <div class="team-total" id="endTotal"></div>
    <p class="end-summary" id="endSummary"></p>
    <div class="player-rows" id="endPlayerRows"></div>
    <button id="playAgainBtn" class="btn btn-primary">🔁 Nochmal spielen</button>
    <button id="backToSetupBtn" class="btn btn-secondary">⚙️ Hauptmenü</button>
  </section>

</div>

    "P": "Potsdam", "PA": "Passau", "PAF": "Pfaffenhofen", "PAN": "Pfarrkirchen", "PB": "Paderborn", "PE": "Peine", "PF": "Pforzheim", "PI": "Pinneberg", "PIR": "Pirna", "PLÖ": "Plön", "PR": "Prignitz", "PS": "Pirmasens", "Q": "Halle (Behörden)", "QLB": "Quedlinburg",
    "R": "Regensburg", "RA": "Rastatt", "RD": "Rendsburg", "RE": "Recklinghausen", "REG": "Regen", "RO": "Rosenheim", "ROW": "Rotenburg (Wümme)", "RS": "Remscheid", "RT": "Reutlingen", "RÜD": "Rüdesheim", "RV": "Ravensburg", "RW": "Rottweil", "RZ": "Ratzeburg / Hzgt. Lauenburg",
    "S": "Stuttgart", "SAD": "Schwandorf", "SB": "Saarbrücken", "SC": "Schwabach", "SDH": "Sondershausen", "SE": "Bad Segeberg", "SG": "Solingen", "SHA": "Schwäbisch Hall", "SI": "Siegen", "SIG": "Sigmaringen", "SIM": "Simmern", "SK": "Saalekreis", "SL": "Schleswig-Flensburg", "SN": "Schwerin", "SO": "Soest", "SP": "Speyer", "SR": "Straubing", "ST": "Steinfurt", "STA": "Starnberg", "STD": "Stade", "SU": "Suhl", "SÜW": "Südliche Weinstraße", "SW": "Schweinfurt", "SZ": "Salzgitter",
    "TBB": "Tauberbischofsheim", "TF": "Teltow-Fläming", "TG": "Torgau", "TIR": "Tirschenreuth", "TO": "Torgau-Oschatz", "TÖL": "Bad Tölz", "TR": "Trier", "TS": "Traunstein", "TÜ": "Tübingen", "TUT": "Tuttlingen",
    "UE": "Uelzen", "UH": "Unstrut-Hainich-Kreis", "UL": "Ulm", "UM": "Uckermark", "UN": "Unna",
    "V": "Vogtlandkreis", "VAI": "Vaihingen", "VB": "Vogelsbergkreis", "VEC": "Vechta", "VER": "Verden", "VIE": "Viersen", "VK": "Völklingen", "VS": "Villingen-Schwenningen",
    "W": "Wuppertal", "WAF": "Warendorf", "WAK": "Wartburgkreis", "WB": "Wittenberg", "WE": "Weimar", "WEN": "Weiden in der Oberpfalz", "WES": "Wesel", "WF": "Wolfenbüttel", "WHV": "Wilhelmshaven", "WI": "Wiesbaden", "WIL": "Wittlich", "WL": "Winsen (Luhe) / Harburg", "WN": "Waiblingen", "WND": "St. Wendel", "WO": "Worms", "WOB": "Wolfsburg", "WSW": "Weißwasser", "WT": "Waldshut", "WTM": "Wittmund", "WÜ": "Würzburg", "WUG": "Weißenburg", "WUN": "Wunsiedel", "WW": "Westerwaldkreis",
    "Z": "Zwickau", "ZE": "Zerbst", "ZI": "Zittau", "ZW": "Zweibrücken"
  };

  // --- APP STATE & ELEMENTS ---
  let players = [];
  let currentMode = 'slogans'; 
  let activePool = [];
  let currentIdx = 0;
  let currentPlayerIdx = 0;
  let teamScore = 0;
  let targetScore = 0;

  const els = {
    setup: document.getElementById('setup'),
    gameSlogans: document.getElementById('game-slogans'),
    gamePlates: document.getElementById('game-plates'),
    gameQuotes: document.getElementById('game-quotes'),
    end: document.getElementById('end'),
    topbarTitle: document.getElementById('topbarTitle'),
    roundCounter: document.getElementById('roundCounter'),
    gameSelect: document.getElementById('gameSelect'),
    rulesBox: document.getElementById('rulesBox'),
    playerForm: document.getElementById('playerForm'),
    playerNameInput: document.getElementById('playerNameInput'),
    playerList: document.getElementById('playerList'),
    settingLabel: document.getElementById('settingLabel'),
    settingSelect: document.getElementById('settingSelect'),
    startBtn: document.getElementById('startBtn'),
    
    // Shared
    endTotal: document.getElementById('endTotal'),
    endSummary: document.getElementById('endSummary'),
    endPlayerRows: document.getElementById('endPlayerRows'),
    playAgainBtn: document.getElementById('playAgainBtn'),
    backToSetupBtn: document.getElementById('backToSetupBtn')
  };

  const GAMES = {
    slogans: {
      title: "📺 Werbepause",
      rules: "<h2>Wer kennt die Marke?</h2><ol><li>Handy geht reihum.</li><li>Spruch vorlesen, Marke raten.</li><li>Auf 'Marke zeigen' tippen und kontrollieren.</li></ol>",
      settingLabel: "Fragen pro Runde:",
      settings: [
        { v: '30', t: '30 Fragen' }, { v: '50', t: '50 Fragen' }, { v: 'all', t: 'Alle Fragen' }
      ]
    },
    plates: {
      title: "🚗 Kennzeichen-Jäger",
      rules: "<h2>Wer sieht's zuerst?</h2><ol><li>Der Beifahrer hält das Handy bereit.</li><li>Kennzeichen auf der Autobahn gesehen? Abtippen & suchen!</li><li>Wer wusste zuerst, woher es kommt? Punkt verteilen!</li></ol>",
      settingLabel: "Spielen bis:",
      settings: [
        { v: '5', t: '5 Punkte' }, { v: '10', t: '10 Punkte' }, { v: '15', t: '15 Punkte' }
      ]
    },
    quotes: {
      title: "⚽ Fußball-Mythen",
      rules: "<h2>Wer hat's gesagt?</h2><ol><li>Handy geht reihum.</li><li>Legendäres Fußball-Zitat vorlesen.</li><li>Eine der 4 Antworten antippen und Punkte sammeln.</li></ol>",
      settingLabel: "Fragen pro Runde:",
      settings: [
        { v: '10', t: '10 Fragen' }, { v: 'all', t: 'Alle Fragen' }
      ]
    }
  };

  // --- UTILS ---
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
  function cleanSlogan(slogan, brand) {
    const re = new RegExp(escapeRegex(brand), 'gi');
    return slogan.replace(re, '___');
  }

  // --- SETUP LOGIC ---
  function updateSetupUI() {
    currentMode = els.gameSelect.value;
    const info = GAMES[currentMode];
    els.topbarTitle.textContent = info.title;
    els.rulesBox.innerHTML = info.rules;
    els.settingLabel.textContent = info.settingLabel;
    
    els.settingSelect.innerHTML = '';
    info.settings.forEach(opt => {
      const o = document.createElement('option');
      o.value = opt.v; o.textContent = opt.t;
      els.settingSelect.appendChild(o);
    });
  }
  els.gameSelect.addEventListener('change', updateSetupUI);
  updateSetupUI(); // Init

  function renderPlayerList() {
    els.playerList.innerHTML = '';
    players.forEach((p, i) => {
      const li = document.createElement('li');
      li.innerHTML = `<span>${p.name}</span> <button aria-label="Entfernen">×</button>`;
      li.querySelector('button').onclick = () => { players.splice(i, 1); renderPlayerList(); };
      els.playerList.appendChild(li);
    });
  }
  els.playerForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = els.playerNameInput.value.trim();
    if (name) { players.push({ name, score: 0 }); els.playerNameInput.value = ''; renderPlayerList(); }
  });

  document.querySelectorAll('.restart-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (confirm('Aktuelle Runde abbrechen und ins Menü?')) showSetup();
    });
  });

  // --- SCOREBOARD RENDERER ---
  function renderTally(n) {
    const full = Math.floor(n / 5);
    const rem = n % 5;
    let html = '<span class="tally">';
    for (let i = 0; i < full; i++) html += '<span class="tally-group"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="strike"></span></span>';
    for (let i = 0; i < rem; i++) html += '<span class="bar"></span>';
    html += '<span class="tally-num">' + n + '</span></span>';
    return html;
  }
  function renderScoreboard(containerId, isTurnBased = false, maxPoints = null) {
    const container = document.getElementById(containerId);
    let html = '';
    
    if (currentMode !== 'plates') {
      html += `<div class="team-total"><div class="big-number">${teamScore} / ${activePool.length}</div><div class="label">zusammen gelöst</div></div>`;
    } else {
      html += `<div class="team-total"><div class="label" style="margin-top:0;">Gespielt wird bis ${targetScore} Punkte</div></div>`;
    }

    if (players.length > 0) {
      html += '<div class="player-rows">';
      players.forEach((p, i) => {
        const active = (isTurnBased && i === currentPlayerIdx) ? ' active' : '';
        html += `<div class="player-row${active}"><span class="player-name">${p.name}</span>${renderTally(p.score)}</div>`;
      });
      html += '</div>';
    } else if (currentMode !== 'plates') {
      html += '<p class="hint">Ohne Spieler eingetragen zählt nur der Gesamt-Score.</p>';
    } else {
      html += '<p class="hint" style="color:var(--red);">Achtung: Ohne eingetragene Spieler macht dieses Spiel wenig Sinn, geht nochmal zurück!</p>';
    }
    container.innerHTML = html;
  }

  // --- GAME 1: SLOGANS LOGIC ---
  const elFrontQ = document.getElementById('frontQuote');
  const elBackB = document.getElementById('backBrand');
  const elBackQ = document.getElementById('backQuote');
  const elTagCard = document.getElementById('tagCard');
  const elRevActions = document.getElementById('revealActions');
  const elJudgeActions = document.getElementById('judgeActions');
  const turnIndSlogans = document.getElementById('turnIndicatorSlogans');

  function startSlogans() {
    activePool = shuffle(SLOGANS);
    const setting = els.settingSelect.value;
    if (setting !== 'all') activePool = activePool.slice(0, parseInt(setting, 10));
    currentIdx = 0; currentPlayerIdx = 0; teamScore = 0;
    players.forEach(p => p.score = 0);
    els.setup.classList.add('hidden');
    els.gameSlogans.classList.remove('hidden');
    loadSlogan();
  }

  function loadSlogan() {
    if (currentIdx >= activePool.length) return showEnd();
    const item = activePool[currentIdx];
    elFrontQ.textContent = '„' + cleanSlogan(item.slogan, item.brand) + '“';
    elBackB.textContent = item.brand;
    elBackQ.textContent = '„' + item.slogan + '“';
    elTagCard.classList.remove('flipped');
    elRevActions.classList.remove('hidden');
    elJudgeActions.classList.add('hidden');
    els.roundCounter.textContent = 'Frage ' + (currentIdx + 1) + ' / ' + activePool.length;
    turnIndSlogans.textContent = players.length > 0 ? `🎯 ${players[currentPlayerIdx].name} rät die Marke:` : '🎯 Nächste Person ist dran:';
    renderScoreboard('scoreboardSlogans', true);
  }

  document.getElementById('revealBtn').onclick = () => {
    elTagCard.classList.add('flipped');
    elRevActions.classList.add('hidden');
    elJudgeActions.classList.remove('hidden');
  };

  function judgeSlogan(correct) {
    if (correct) { teamScore++; if (players.length > 0) players[currentPlayerIdx].score++; }
    if (players.length > 0) currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
    currentIdx++;
    elTagCard.classList.add('no-transition'); elTagCard.classList.remove('flipped');
    void elTagCard.offsetHeight; 
    loadSlogan();
    requestAnimationFrame(() => elTagCard.classList.remove('no-transition'));
  }
  document.getElementById('correctBtn').onclick = () => judgeSlogan(true);
  document.getElementById('wrongBtn').onclick = () => judgeSlogan(false);

  // --- GAME 2: PLATES LOGIC ---
  const elPlateForm = document.getElementById('plateForm');
  const elPlateInput = document.getElementById('plateInput');
  const elPlateResArea = document.getElementById('plateResultArea');
  const elPlateCity = document.getElementById('plateCity');
  const elPlateDistrict = document.getElementById('plateDistrict');
  const elAwardGrid = document.getElementById('awardGrid');

  function startPlates() {
    targetScore = parseInt(els.settingSelect.value, 10);
    players.forEach(p => p.score = 0);
    els.roundCounter.textContent = 'Ziel: ' + targetScore;
    els.setup.classList.add('hidden');
    els.gamePlates.classList.remove('hidden');
    resetPlateSearch();
    renderScoreboard('scoreboardPlates', false, targetScore);
  }

  function resetPlateSearch() {
    elPlateInput.value = '';
    elPlateResArea.classList.add('hidden');
    elPlateInput.focus();
  }

  elPlateForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const query = elPlateInput.value.trim().toUpperCase();
    if (!query) return;
    
    const result = PLATES[query];
    if (result) {
      elPlateCity.textContent = result;
      elPlateDistrict.textContent = "Kennzeichen: " + query;
      
      elAwardGrid.innerHTML = '';
      if (players.length > 0) {
        players.forEach((p, i) => {
          const btn = document.createElement('button');
          btn.className = 'btn btn-primary';
          btn.style.padding = '10px';
          btn.textContent = p.name;
          btn.onclick = () => awardPlatePoint(i);
          elAwardGrid.appendChild(btn);
        });
        document.getElementById('awardPointsBox').classList.remove('hidden');
      } else {
        document.getElementById('awardPointsBox').classList.add('hidden');
      }
      
      elPlateResArea.classList.remove('hidden');
      elPlateInput.blur();
    } else {
      alert("Kennzeichen nicht gefunden!");
      elPlateInput.value = '';
    }
  });

  function awardPlatePoint(playerIdx) {
    players[playerIdx].score++;
    renderScoreboard('scoreboardPlates', false, targetScore);
    if (players[playerIdx].score >= targetScore) {
      showEnd(players[playerIdx].name + " hat gewonnen! 🏁");
    } else {
      resetPlateSearch();
    }
  }
  document.getElementById('nobodyBtn').onclick = resetPlateSearch;

  // --- GAME 3: QUOTES LOGIC ---
  const elQuoteText = document.getElementById('quoteText');
  const elMcGrid = document.getElementById('mcGrid');
  const elNextQuoteBtn = document.getElementById('nextQuoteBtn');
  const turnIndQuotes = document.getElementById('turnIndicatorQuotes');

  function startQuotes() {
    activePool = shuffle(QUOTES);
    const setting = els.settingSelect.value;
    if (setting !== 'all') activePool = activePool.slice(0, parseInt(setting, 10));
    currentIdx = 0; currentPlayerIdx = 0; teamScore = 0;
    players.forEach(p => p.score = 0);
    els.setup.classList.add('hidden');
    els.gameQuotes.classList.remove('hidden');
    loadQuote();
  }

  function loadQuote() {
    if (currentIdx >= activePool.length) return showEnd();
    const item = activePool[currentIdx];
    elQuoteText.textContent = '„' + item.q + '“';
    
    // Mische richtige und falsche Antworten
    const opts = shuffle([item.a, ...item.w]);
    
    elMcGrid.innerHTML = '';
    opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'mc-btn';
      btn.textContent = opt;
      btn.onclick = () => handleQuoteAnswer(btn, opt === item.a, item.a);
      elMcGrid.appendChild(btn);
    });

    elNextQuoteBtn.classList.add('hidden');
    els.roundCounter.textContent = 'Frage ' + (currentIdx + 1) + ' / ' + activePool.length;
    turnIndQuotes.textContent = players.length > 0 ? `🎯 ${players[currentPlayerIdx].name} ist dran:` : '🎯 Wer hat es gesagt?';
    renderScoreboard('scoreboardQuotes', true);
  }

  function handleQuoteAnswer(clickedBtn, isCorrect, correctAnswer) {
    const allBtns = elMcGrid.querySelectorAll('.mc-btn');
    allBtns.forEach(b => {
      b.disabled = true;
      if (b.textContent === correctAnswer) b.classList.add('correct');
    });

    if (isCorrect) {
      teamScore++;
      if (players.length > 0) players[currentPlayerIdx].score++;
    } else {
      clickedBtn.classList.add('wrong');
    }

    renderScoreboard('scoreboardQuotes', true);
    elNextQuoteBtn.classList.remove('hidden');
  }

  elNextQuoteBtn.onclick = () => {
    if (players.length > 0) currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
    currentIdx++;
    loadQuote();
  };


  // --- GLOBAL LOGIC ---
  els.startBtn.addEventListener('click', () => {
    if (currentMode === 'slogans') startSlogans();
    else if (currentMode === 'plates') startPlates();
    else if (currentMode === 'quotes') startQuotes();
  });

  function showSetup() {
    els.gameSlogans.classList.add('hidden');
    els.gamePlates.classList.add('hidden');
    els.gameQuotes.classList.add('hidden');
    els.end.classList.add('hidden');
    els.setup.classList.remove('hidden');
    els.roundCounter.textContent = '';
  }

  function showEnd(customMsg = null) {
    els.gameSlogans.classList.add('hidden');
    els.gamePlates.classList.add('hidden');
    els.gameQuotes.classList.add('hidden');
    els.end.classList.remove('hidden');
    els.roundCounter.textContent = '';

    if (currentMode === 'plates') {
      els.endTotal.innerHTML = `<div class="label" style="font-size:16px;">${customMsg || "Spiel beendet"}</div>`;
      els.endSummary.textContent = "";
    } else {
      els.endTotal.innerHTML = `<div class="big-number">${teamScore} / ${activePool.length}</div><div class="label">Gesamt gelöst</div>`;
      const pct = Math.round((teamScore / activePool.length) * 100);
      let msg;
      if (pct >= 85) msg = 'Wahnsinn – Legendenstatus! 🏆';
      else if (pct >= 50) msg = 'Starke Leistung, Respekt! 🔥';
      else msg = 'Da ist noch Luft nach oben! 😂';
      els.endSummary.textContent = msg;
    }

    els.endPlayerRows.innerHTML = '';
    if (players.length > 0) {
      const sorted = players.slice().sort((a, b) => b.score - a.score);
      sorted.forEach((p, i) => {
        const crown = (i === 0 && p.score > 0) ? ' 👑' : '';
        const row = document.createElement('div');
        row.className = 'player-row';
        row.innerHTML = `<span class="player-name">${p.name}${crown}</span>${renderTally(p.score)}`;
        els.endPlayerRows.appendChild(row);
      });
    }
  }

  els.playAgainBtn.onclick = () => {
    if (currentMode === 'slogans') startSlogans();
    else if (currentMode === 'plates') startPlates();
    else if (currentMode === 'quotes') startQuotes();
  };
  els.backToSetupBtn.onclick = showSetup;

</script>
</body>
</html>
